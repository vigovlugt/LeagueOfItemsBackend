name: Export Dataset

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: src/ConsoleApp/

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Download data from Riot
      run: dotnet bin/Release/net8.0/LeagueOfItems.ConsoleApp.dll riot
      env:
        "Github:Token": ${{ secrets.TOKEN }}
        
    - name: Download data from U.GG
      run: dotnet bin/Release/net8.0/LeagueOfItems.ConsoleApp.dll ugg
      env:
        "Github:Token": ${{ secrets.TOKEN }}
        
    - name: Export data to frontend Github
      run: dotnet bin/Release/net8.0/LeagueOfItems.ConsoleApp.dll github
      env:
        "Github:Token": ${{ secrets.TOKEN }}
        "Cloudflare:AccountId": ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        "Cloudflare:AnalyticsApiToken": ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN }}
